name: DVC Tracking with Github Actions
on: [pull request]
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate Report
        run: |
          echo "## Build Report 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Status: Success" >> $GITHUB_STEP_SUMMARY
          echo "- Tally: 15 tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: 85%" >> $GITHUB_STEP_SUMMARY
  run:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Running_updates
        env: 
          GH_TOKEN: ${{ github.token }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          make install 
          dvc repro
          git fetch --prune
          echo "### 📊 Analysis for ${{ github.sha }}" > report.md
          dvc metrics diff  >> report.md
      - name: Post Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: report.md
        
          
